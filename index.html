<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neo Hide — Matrix Steganography</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

        <div class="site-header">
            <div class="logo-mark">
                <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <rect x="3" y="3" width="4" height="4" rx="1" fill="#63b3ed"/>
                    <rect x="10" y="3" width="4" height="4" rx="1" fill="#63b3ed" opacity="0.5"/>
                    <rect x="17" y="3" width="4" height="4" rx="1" fill="#63b3ed"/>
                    <rect x="3" y="10" width="4" height="4" rx="1" fill="#63b3ed" opacity="0.3"/>
                    <rect x="10" y="10" width="4" height="4" rx="1" fill="#68d391"/>
                    <rect x="17" y="10" width="4" height="4" rx="1" fill="#63b3ed" opacity="0.5"/>
                    <rect x="3" y="17" width="4" height="4" rx="1" fill="#63b3ed"/>
                    <rect x="10" y="17" width="4" height="4" rx="1" fill="#63b3ed" opacity="0.3"/>
                    <rect x="17" y="17" width="4" height="4" rx="1" fill="#63b3ed" opacity="0.7"/>
                </svg>
            </div>
            <div>
                <h1>Neo Hide</h1>
                <p>matrix steganography · hamming-based LSB encoding</p>
            </div>
            <div style="margin-left:auto;">
                <a href="explanation.html" style="font-size:0.75rem; opacity:0.6;">how it works →</a>
            </div>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="openTab(event, 'embedTab')">embed</button>
            <button class="tab" onclick="openTab(event, 'extractTab')">extract</button>
            <button class="tab" onclick="openTab(event, 'compareTab')">compare</button>
        </div>

        <!-- Embed Tab -->
        <div id="embedTab" class="tab-content active">

            <div class="form-group">
                <label for="coverImage">Cover Image</label>
                <input type="file" id="coverImage" accept="image/*">
                <div class="preview-container">
                    <img id="coverPreview" class="hidden">
                </div>
            </div>

            <div class="form-group">
                <label for="embedText">Secret Message</label>
                <textarea id="embedText" rows="3" placeholder="Enter the text to hide…"></textarea>
            </div>

            <div class="form-group">
                <label>Encoding Options</label>
                <div class="controls-row">
                    <div>
                        <div style="font-family:var(--mono);font-size:0.72rem;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.06em;">BITS PER BLOCK</div>
                        <input type="number" id="bitsPerBlock" value="7" min="1" max="24">
                    </div>
                    <button id="maxBlockSizeBtn" type="button" style="align-self:flex-end;">max block</button>
                </div>
                <label class="checkbox-row" style="margin-top:12px;">
                    <input type="checkbox" id="highCapacityEmbed">
                    <span>High capacity mode <span class="capacity-badge">RGB · 7 bits/channel</span></span>
                </label>
            </div>

            <button id="embedBtn" type="button">Embed Message</button>

            <div class="progress-container hidden" id="embedProgressContainer">
                <div class="progress-bar" id="embedProgress">0%</div>
            </div>

            <div class="result-container hidden" id="embedResult">
                <h3>Steganographic Image</h3>
                <p id="embedMessage" style="font-family:var(--mono);font-size:0.8rem;color:var(--text-muted);margin-bottom:1rem;"></p>
                <div class="preview-container">
                    <img id="stegoPreview">
                </div>
                <button id="downloadStegoBtn" type="button" style="margin-top:1rem;">Download Image</button>
            </div>
        </div>

        <!-- Extract Tab -->
        <div id="extractTab" class="tab-content">
            <div class="form-group">
                <label for="stegoImage">Stego Image</label>
                <input type="file" id="stegoImage" accept="image/*">
                <div class="preview-container">
                    <img id="stegoExtractPreview" class="hidden">
                </div>
            </div>

            <div class="form-group">
                <label>Encoding Options</label>
                <div class="controls-row">
                    <div>
                        <div style="font-family:var(--mono);font-size:0.72rem;color:var(--text-muted);margin-bottom:6px;letter-spacing:0.06em;">BITS PER BLOCK</div>
                        <input type="number" id="extractBitsPerBlock" value="7" min="1" max="24">
                    </div>
                </div>
                <label class="checkbox-row" style="margin-top:12px;">
                    <input type="checkbox" id="highCapacityExtract">
                    <span>High capacity mode <span class="capacity-badge">RGB · 7 bits/channel</span></span>
                </label>
            </div>

            <button id="extractBtn" type="button">Extract Message</button>

            <div class="progress-container hidden" id="extractProgressContainer">
                <div class="progress-bar" id="extractProgress">0%</div>
            </div>

            <div class="result-container hidden" id="extractResult">
                <h3>Extracted Message</h3>
                <textarea id="extractedText" rows="5" readonly style="margin-top:0.5rem;"></textarea>
                <div id="binaryResult" class="hidden">
                    <p id="binaryDetails" style="font-family:var(--mono);font-size:0.78rem;color:var(--text-muted);margin:0.75rem 0;"></p>
                    <button id="downloadBinaryBtn" type="button">Download Payload</button>
                    <label style="margin-top:1rem;">Base64 Preview</label>
                    <textarea id="binaryBase64" rows="4" readonly></textarea>
                </div>
            </div>
        </div>

        <!-- Compare Tab -->
        <div id="compareTab" class="tab-content">
            <div class="form-group">
                <label for="image1">Original Image</label>
                <input type="file" id="image1" accept="image/*">
                <div class="preview-container">
                    <img id="image1Preview" class="hidden">
                </div>
            </div>

            <div class="form-group">
                <label for="image2">Stego Image</label>
                <input type="file" id="image2" accept="image/*">
                <div class="preview-container">
                    <img id="image2Preview" class="hidden">
                </div>
            </div>

            <button id="compareBtn" type="button">Compare Images</button>

            <div id="compareResult" class="hidden"></div>
        </div>

    </div>

    <script src="matrix_stego.js"></script>
</body>
</html>
